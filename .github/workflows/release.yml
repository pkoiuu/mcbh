# Release 构建 — 打 tag v* 自动构建完整安装包并发布到 GitHub Releases
# 产出: 开箱即用的 EXE 安装包，包含启动器 + JRE 21 + WebView2 + .minecraft 全量游戏文件
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '11'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            src/Baihe.UI/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('src/Baihe.UI/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # ===== 1. 构建前端 =====
      - name: Build frontend
        working-directory: src/Baihe.UI
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      # ===== 2. 构建 JRE 21 (20 模块，覆盖 Minecraft + Fabric Mixin + LWJGL 全部需求) =====
      - name: Build JRE 21 with jlink
        run: |
          $jmods = "$env:JAVA_HOME\jmods"
          jlink `
            --module-path $jmods `
            --add-modules java.base,java.compiler,java.desktop,java.management,java.net.http,java.naming,java.scripting,java.sql,java.xml,java.logging,java.security.sasl,java.transaction.xa,java.instrument,java.prefs,java.rmi,java.security.jgss,jdk.crypto.ec,jdk.zipfs,jdk.management,jdk.unsupported `
            --output dist\launcher\jre `
            --strip-debug --no-man-pages --no-header-files --compress=2

      # ===== 3. 下载 WebView2 离线安装程序 =====
      - name: Download WebView2 Installer
        run: |
          $url = "https://go.microsoft.com/fwlink/p/?LinkId=2124702"
          Invoke-WebRequest -Uri $url -OutFile "dist\launcher\MicrosoftEdgeWebView2RuntimeInstallerX64.exe"

      # ===== 4. 获取 .minecraft 游戏资源包 =====
      - name: Download .minecraft Release Asset
        run: |
          # 从 v1.0-assets Release 下载预置的 .minecraft 完整包
          # 包含: 版本文件 + 库 + 资源 + 模组 + Fabric 缓存 + 配置
          gh release download v1.0-assets --pattern "minecraft.7z" --output minecraft.7z --clobber
          7z x minecraft.7z -odist\ -y
          Remove-Item minecraft.7z
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ===== 5. 发布后端 (自包含 .NET 10 运行时) =====
      - name: Publish Baihe.Host
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          Write-Host "Publishing version: $version"
          dotnet publish src/Baihe.Host/Baihe.Host.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishReadyToRun=true `
            -p:PublishTrimmed=false `
            -p:AssemblyVersion=$version `
            -p:FileVersion=$version `
            -o dist\launcher

      # ===== 6. 复制附加资源 =====
      - name: Copy installer resources
        run: |
          Copy-Item installer_resources\icon.ico dist\launcher\ -Force
          Copy-Item fabric-installer.jar dist\launcher\ -Force

      # ===== 7. 验证打包内容完整性 (信息性，不阻断构建) =====
      - name: Verify package contents
        run: |
          $ErrorActionPreference = 'Continue'
          Write-Host "=== dist\launcher ==="
          if (Test-Path dist\launcher) { Get-ChildItem dist\launcher -File | Select-Object Name, @{N='SizeKB';E={[math]::Round($_.Length/1KB,0)}} }
          Write-Host "`n=== dist\launcher\jre\bin ==="
          if (Test-Path dist\launcher\jre\bin) { Get-ChildItem dist\launcher\jre\bin -File | Select-Object Name }
          Write-Host "`n=== dist\launcher\wwwroot ==="
          if (Test-Path dist\launcher\wwwroot) { Get-ChildItem dist\launcher\wwwroot -File | Select-Object Name }
          Write-Host "`n=== dist\.minecraft ==="
          if (Test-Path dist\.minecraft) { Get-ChildItem dist\.minecraft -Directory | Select-Object Name }
          Write-Host "`n=== .minecraft\versions ==="
          if (Test-Path dist\.minecraft\versions) { Get-ChildItem dist\.minecraft\versions -Directory | Select-Object Name }
          Write-Host "`n=== .minecraft\mods ==="
          if (Test-Path dist\.minecraft\mods) { Get-ChildItem dist\.minecraft\mods -File | Select-Object Name, @{N='SizeKB';E={[math]::Round($_.Length/1KB,0)}} }
          Write-Host "`n=== .minecraft\.fabric ==="
          if (Test-Path dist\.minecraft\.fabric) { Write-Host "Fabric cache: EXISTS" } else { Write-Host "Fabric cache: MISSING!" }
          Write-Host "`n=== .minecraft\assets\objects count ==="
          if (Test-Path dist\.minecraft\assets\objects) { (Get-ChildItem dist\.minecraft\assets\objects -Recurse -File).Count } else { Write-Host "assets/objects: MISSING!" }

      # ===== 8. 编译 Inno Setup 安装包 =====
      - name: Build installer with Inno Setup
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          Write-Host "Building installer version: $version"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version installer\baihe_installer.iss

      # ===== 9. 上传到 GitHub Releases =====
      - name: Upload installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/白鹤服务器启动器_Setup_*.exe
          generate_release_notes: true
          body: |
            ## 白鹤服务器启动器 v${{ github.ref_name }}

            ### 包含内容
            - 白鹤启动器主程序 (自包含 .NET 10 运行时)
            - Java 21 JRE (20 模块，jlink 最小化构建，含 java.compiler + jdk.unsupported)
            - WebView2 Runtime 离线安装程序
            - Minecraft 1.21.3 + Fabric Loader 0.16.14
            - 10 个预装模组 (钠、玉、苹果皮、Xaero小地图等)
            - 3985 个资源文件 (assets/objects)
            - 76 个库文件 + 9 个原生库
            - Fabric 预处理缓存 (.fabric)
            - 全量模组配置文件

            ### 系统要求
            - Windows 10 64 位或更高
            - 无需预装 Java 或 .NET
            - 无需管理员权限

            ### 安装说明
            下载 EXE 安装包，双击运行即可。安装程序会自动:
            1. 安装到用户目录 (%LOCALAPPDATA%\BaiheServer)
            2. 检测并安装 WebView2 Runtime (如未安装)
            3. 创建桌面和开始菜单快捷方式
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
