<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>白鹤服务器</title>
    <script>
      // 防闪烁: 在 Svelte 渲染前根据 localStorage 同步主题，默认暗色
      (function () {
        try {
          if (localStorage.getItem('baihe_theme') !== 'light') {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%svelte%</div>
  </body>
</html>
